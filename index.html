<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobLynk Links</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
            background: #f8fafc;
            color: #1e293b;
        }
        h1 {
            color: #0f172a;
            border-bottom: 3px solid #2563eb;
            display: inline-block;
            padding-bottom: 0.5rem;
        }
        .links {
            margin: 2rem 0;
            text-align: left;
            display: inline-block;
        }
        a {
            display: block;
            margin: 1rem 0;
            padding: 0.75rem 1rem;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            color: #2563eb;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.2s;
        }
        a:hover {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
            transform: translateX(5px);
        }
        .footer {
            margin-top: 2rem;
            color: #64748b;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <h1>JobLynk Links</h1>
    <p>Quick access to all JobLynk pages:</p>
    <div class="links">
        <a href="https://joblynk.live">🏠 Main Site</a>
        <a href="https://joblynk.live/blog">📝 Blog</a>
        <a href="https://joblynk.live/contact">📞 Contact</a>
        <a href="https://joblynk.live/payportal">💰 Pay Portal</a>
        <a href="https://joblynk.live/employers">🏢 Employer Portal</a>
        <a href="https://joblynk.live/signup">✍️ Sign Up</a>
    </div>
    <div class="footer">
        © 2026 JobLynk.live — Bridging Jobs & Talent
    </div>
</body>
</html>
